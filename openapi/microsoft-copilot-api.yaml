    # — Packages API ——————————————————————————————
    PackageCollectionResponse:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/Package'
        '@odata.count':
          type: integer
        '@odata.nextLink':
          type: string
          format: uri

    Package:
      type: object
