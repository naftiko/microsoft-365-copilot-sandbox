# ════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════
components:

  # ── Security Schemes ──────────────────────────
  securitySchemes:
    OAuth2:
      type: oauth2
      description: OAuth 2.0 authorization using Microsoft identity platform.
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
          tokenUrl: https://login.microsoftonline.com/common/oauth2/v2.0/token
          scopes:
            Copilot.Retrieval.Read: Read Microsoft 365 content via Copilot retrieval.
            Copilot.Search.Read: Search OneDrive content via Copilot.
            Copilot.Interaction.Read: Read Copilot interaction records.
            Copilot.Interaction.ReadWrite: Read and export Copilot interactions.
            Copilot.ChangeNotification.ReadWrite: Manage change notification subscriptions.
            Copilot.MeetingInsights.Read: Read AI-generated meeting insights.
            Copilot.Chat.ReadWrite: Send and receive Copilot chat messages.
            Reports.Read.All: Read usage reports.
            Copilot.Package.ReadWrite.All: Manage apps and agents.

  # ── Reusable Parameters ───────────────────────
  parameters:
    TopParam:
      name: $top
      in: query
      description: Maximum number of results to return.
      schema:
        type: integer
        minimum: 1
        maximum: 999
        default: 25

    SkipParam:
      name: $skip
      in: query
      description: Number of results to skip for pagination.
      schema:
        type: integer
        minimum: 0
        default: 0

    FilterParam:
      name: $filter
      in: query
      description: OData filter expression.
      schema:
        type: string

    OrderByParam:
      name: $orderby
      in: query
      description: OData order-by expression.
      schema:
        type: string

  # ── Reusable Responses ────────────────────────
  responses:
    BadRequest:
      description: Bad request — invalid input or missing required fields.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            BadRequest:
              value:
                error:
                  code: "BadRequest"
                  message: "The request is invalid. Check the request body for missing or malformed fields."
                  innerError:
                    requestId: "req-err-400-001"
                    date: "2025-09-10T12:00:00Z"

    Unauthorized:
      description: Unauthorized — missing or invalid authentication token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Unauthorized:
              value:
                error:
                  code: "Unauthorized"
                  message: "Authentication token is missing, expired, or invalid."
                  innerError:
                    requestId: "req-err-401-001"
                    date: "2025-09-10T12:00:00Z"

    Forbidden:
      description: Forbidden — insufficient permissions for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Forbidden:
              value:
                error:
                  code: "Forbidden"
                  message: "Insufficient privileges to complete the operation. Verify the required permissions are granted."
                  innerError:
                    requestId: "req-err-403-001"
                    date: "2025-09-10T12:00:00Z"

    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            NotFound:
              value:
                error:
                  code: "NotFound"
                  message: "The requested resource could not be found."
                  innerError:
                    requestId: "req-err-404-001"
                    date: "2025-09-10T12:00:00Z"

    TooManyRequests:
      description: Rate limit exceeded. Retry after the period in the Retry-After header.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            TooManyRequests:
              value:
                error:
                  code: "TooManyRequests"
                  message: "Rate limit exceeded. Please retry after the number of seconds specified in the Retry-After header."
                  innerError:
                    requestId: "req-err-429-001"
                    date: "2025-09-10T12:00:00Z"

    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            InternalServerError:
              value:
                error:
                  code: "InternalServerError"
                  message: "An unexpected error occurred while processing the request. Please try again later."
                  innerError:
                    requestId: "req-err-500-001"
                    date: "2025-09-10T12:00:00Z"

  # ── Schemas ───────────────────────────────────
  schemas:

    # — Common ————————————————————————————————————
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code.
            message:
              type: string
              description: Human-readable error message.
            innerError:
              type: object
              properties:
                requestId:
                  type: string
                date:
                  type: string
                  format: date-time
          required:
            - code
            - message

    # — Content Retrieval API —————————————————————
    RetrievalQueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: The natural language query to retrieve relevant content.
          examples:
            - What is our company's remote work policy?
        contentSources:
          type: array
          description: >
            Optional list of content sources to scope the retrieval (e.g.,
            SharePoint sites, OneDrive locations).
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - sharePointSite
                  - oneDrive
                  - teams
              id:
                type: string
                description: Resource identifier (site ID, drive ID, etc.).
        maxResults:
          type: integer
          description: Maximum number of content chunks to return.
          default: 10
          minimum: 1
          maximum: 50
        options:
          type: object
          properties:
            respectSensitivityLabels:
              type: boolean
              default: true
              description: Whether to enforce sensitivity label restrictions.
            includeSnippets:
              type: boolean
              default: true
              description: Include text snippets from matched content.

    RetrievalQueryResponse:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/RetrievalResult'
        '@odata.count':
          type: integer

    RetrievalResult:
      type: object
      properties:
        id:
          type: string
        relevanceScore:
          type: number
          format: double
          description: Score indicating relevance of the result (0.0 – 1.0).
        content:
          type: object
          properties:
            snippet:
              type: string
              description: Text excerpt from the matched content.
            sensitivityLabel:
              type: string
              description: Sensitivity label applied to the source document.
        resource:
          type: object
          description: Reference to the source Microsoft 365 resource.
          properties:
            type:
              type: string
              description: Resource type (e.g., driveItem, listItem, message).
            id:
              type: string
            name:
              type: string
            webUrl:
              type: string
              format: uri

    # — Content Search API ————————————————————————
    SearchQueryRequest:
      type: object
      required:
        - queryString
      properties:
        queryString:
          type: string
          description: Natural language search query.
          examples:
            - quarterly budget presentation
        entityTypes:
          type: array
          description: Types of entities to search.
          items:
            type: string
            enum:
              - driveItem
              - listItem
              - site
          default:
            - driveItem
        from:
          type: integer
          description: Offset for pagination.
          default: 0
        size:
          type: integer
          description: Number of results to return.
          default: 25
          maximum: 100
        sortProperties:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              isDescending:
                type: boolean
                default: false

    SearchQueryResponse:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/SearchHit'
        '@odata.count':
          type: integer
        moreResultsAvailable:
          type: boolean

    SearchHit:
      type: object
      properties:
        hitId:
          type: string
        rank:
          type: integer
        summary:
          type: string
          description: AI-generated summary of the search hit.
        resource:
          type: object
          properties:
            '@odata.type':
              type: string
            id:
              type: string
            name:
              type: string
            webUrl:
              type: string
              format: uri
            lastModifiedDateTime:
              type: string
              format: date-time
            createdBy:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    displayName:
                      type: string
                    id:
                      type: string

    # — Interaction Exports API ———————————————————
    InteractionCollectionResponse:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/CopilotInteraction'
        '@odata.count':
          type: integer
        '@odata.nextLink':
          type: string
          format: uri
          description: URL to retrieve the next page of results.

    CopilotInteraction:
      type: object
      properties:
        id:
          type: string
        createdDateTime:
          type: string
          format: date-time
        userId:
          type: string
          description: ID of the user who initiated the interaction.
        userDisplayName:
          type: string
        appId:
          type: string
          description: >
            Microsoft 365 application where the interaction occurred (e.g.,
            Word, Excel, Teams).
        interactionType:
          type: string
          enum:
            - prompt
            - response
            - feedback
        content:
          type: string
          description: The text content of the interaction.
        contextReferences:
          type: array
          description: Resources referenced during the interaction.
          items:
            type: object
            properties:
              type:
                type: string
              id:
                type: string
              name:
                type: string
              webUrl:
                type: string
                format: uri

    # — Change Notifications API ——————————————————
    SubscriptionRequest:
      type: object
      required:
        - changeType
        - notificationUrl
        - resource
        - expirationDateTime
      properties:
        changeType:
          type: string
          description: Type of change to subscribe to.
          enum:
            - created
            - updated
            - deleted
        notificationUrl:
          type: string
          format: uri
          description: >
            HTTPS endpoint that will receive the change notifications.
        resource:
          type: string
          description: >
            The resource path to monitor (e.g., /copilot/interactions).
        expirationDateTime:
          type: string
          format: date-time
          description: When the subscription expires.
        clientState:
          type: string
          description: >
            An opaque string sent back in each notification for validation.

    SubscriptionUpdateRequest:
      type: object
      properties:
        expirationDateTime:
          type: string
          format: date-time

    Subscription:
      type: object
      properties:
        id:
          type: string
        resource:
          type: string
        changeType:
          type: string
        notificationUrl:
          type: string
          format: uri
        expirationDateTime:
          type: string
          format: date-time
        clientState:
          type: string
        createdDateTime:
          type: string
          format: date-time

    SubscriptionCollectionResponse:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'

    # — Meeting Insights API ——————————————————————
    MeetingCollectionResponse:
      type: object
      properties:
        value:
          type: array
          items:
            type: object
            properties:
              meetingId:
                type: string
              subject:
                type: string
              startDateTime:
                type: string
                format: date-time
              endDateTime:
                type: string
                format: date-time
              insightsAvailable:
                type: boolean
        '@odata.count':
          type: integer
        '@odata.nextLink':
          type: string
          format: uri

    MeetingInsights:
      type: object
      properties:
        meetingId:
          type: string
        subject:
          type: string
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        summary:
          type: string
          description: AI-generated summary of the meeting.
        topics:
          type: array
          description: Key discussion topics identified in the meeting.
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              description:
                type: string
              timestamp:
                type: string
                description: Approximate time in the meeting when the topic was discussed.
        actionItems:
          type: array
          description: Action items extracted from the meeting.
          items:
            type: object
            properties:
              id:
                type: string
              description:
                type: string
              assignedTo:
                type: object
                properties:
                  userId:
                    type: string
                  displayName:
                    type: string
              dueDate:
                type: string
                format: date
              status:
                type: string
                enum:
                  - pending
                  - inProgress
                  - completed
        decisions:
          type: array
          description: Decisions made during the meeting.
          items:
            type: object
            properties:
              id:
                type: string
              description:
                type: string
              madeBy:
                type: object
                properties:
                  userId:
                    type: string
                  displayName:
                    type: string
        participants:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              displayName:
                type: string
              role:
                type: string
                enum:
                  - organizer
                  - presenter
                  - attendee

    # — Chat Completions API ——————————————————————
    ChatCompletionRequest:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          description: Conversation message history.
          items:
            type: object
            required:
              - role
              - content
            properties:
              role:
                type: string
                enum:
                  - system
                  - user
                  - assistant
              content:
                type: string
        threadId:
          type: string
          description: >
            Optional thread ID to continue a multi-turn conversation.
        options:
          type: object
          properties:
            groundInM365Content:
              type: boolean
              default: true
              description: >
                Whether to ground responses in the user's Microsoft 365 data.
            maxTokens:
              type: integer
              default: 4096
            temperature:
              type: number
              format: double
              minimum: 0.0
              maximum: 1.0
              default: 0.7

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        threadId:
          type: string
        created:
          type: string
          format: date-time
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finishReason:
                type: string
                enum:
                  - stop
                  - length
                  - contentFilter
        citations:
          type: array
          description: Microsoft 365 resources cited in the response.
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              webUrl:
                type: string
                format: uri
              snippet:
                type: string

    ChatThreadRequest:
      type: object
      properties:
        displayName:
          type: string
          description: Optional display name for the thread.
        initialMessage:
          type: string
          description: Optional first message to send in the thread.

    ChatThread:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        createdDateTime:
          type: string
          format: date-time
        lastUpdatedDateTime:
          type: string
          format: date-time

