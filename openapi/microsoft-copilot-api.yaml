openapi: 3.1.0
info:
  title: microsoft-365-copilot-apis
  description: >
    The Copilot APIs provide a comprehensive set of capabilities that enable you
    to build AI-powered applications grounded in enterprise data. These APIs
    connect your applications to Microsoft 365 content in a secure, compliant,
    and intelligent way.
  version: 1.0.0
  contact:
    name: Microsoft Graph
    url: https://learn.microsoft.com/en-us/graph/
  license:
    name: Microsoft API License
    url: https://learn.microsoft.com/en-us/legal/microsoft-apis/terms-of-use

servers:

  - url: http://localhost:8080/rest/microsoft-365-copilot-apis/1.0.0
    description: Sandbox   
  - url: https://graph.microsoft.com/v1.0
    description: Production
  - url: https://graph.microsoft.com/beta
    description: Beta 

security:
  - OAuth2: []

tags:
  - name: Content Retrieval
    description: >
      Secure, compliant access to relevant Microsoft 365 content such as
      documents, policies, and knowledge bases. Grounding for custom AI models
      without data extraction, with full respect for document access controls
      and sensitivity labels.
  - name: Content Search
    description: >
      Hybrid semantic and lexical search across OneDrive for work or school
      content. Natural language queries with contextual understanding and
      intelligent result ranking while maintaining security and compliance.
      (Preview)
  - name: Interaction Exports
    description: >
      Compliance-oriented capture and archival of user interactions with Copilot
      across Microsoft 365 applications. Records of AI interactions for
      monitoring, auditing, and regulatory compliance in regulated industries.
  - name: Change Notifications
    description: >
      Webhook subscriptions for Copilot interaction events across Microsoft 365.
      Real-time monitoring, proactive compliance checks, anomaly detection, and
      auditing capabilities. (Preview)
  - name: Meeting Insights
    description: >
      AI-generated meeting notes, action items, decisions, and discussion topics
      for Teams meetings. Integration points for project management tools, CRM
      systems, and custom workflows.
  - name: Chat Completions
    description: >
      Conversational experiences powered by Microsoft 365 Copilot in custom
      applications. AI-generated responses grounded in Microsoft 365 data and
      user context with multi-turn conversation support. (Preview)
  - name: Usage Reports
    description: >
      Aggregated and per-user adoption metrics for Microsoft 365 Copilot.
      User counts, feature-level breakdowns, and usage data for organizational
      reporting and tracking.
  - name: Packages
    description: >
      Inventory and governance of apps and agents deployed across Microsoft 365.
      Configuration management, status controls, and deployment tracking for
      organizational packages.

paths:
  # ──────────────────────────────────────────────
  # Content Retrieval API
  # ──────────────────────────────────────────────
  /copilot/retrieval/query:
    post:
      operationId: queryRetrievalContent
      summary: Retrieve relevant content from Microsoft 365
      description: >
        Retrieve contextually relevant information from Microsoft 365 content
        (documents, policies, knowledge bases) while respecting document access
        controls and sensitivity labels. Useful for building specialized
        assistants grounded in organizational data.
      tags:
        - Content Retrieval
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrievalQueryRequest'
      responses:
        '200':
          description: Successfully retrieved relevant content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrievalQueryResponse'
              examples:
                Default:
                  value:
                    value:
                      - id: "ret-result-001"
                        relevanceScore: 0.94
                        content:
                          snippet: "The company remote work policy allows employees to work from home up to three days per week with manager approval."
                          sensitivityLabel: "Internal"
                        resource:
                          type: "driveItem"
                          id: "01ABCDEF23456789"
                          name: "Remote-Work-Policy-2025.docx"
                          webUrl: "https://contoso.sharepoint.com/sites/hr/Shared%20Documents/Remote-Work-Policy-2025.docx"
                      - id: "ret-result-002"
                        relevanceScore: 0.87
                        content:
                          snippet: "Eligible employees must complete the remote work agreement form and submit it to HR before beginning any remote arrangement."
                          sensitivityLabel: "Internal"
                        resource:
                          type: "driveItem"
                          id: "01ABCDEF98765432"
                          name: "HR-Onboarding-Guide.docx"
                          webUrl: "https://contoso.sharepoint.com/sites/hr/Shared%20Documents/HR-Onboarding-Guide.docx"
                    '@odata.count': 2
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ──────────────────────────────────────────────
  # Content Search API (preview)
  # ──────────────────────────────────────────────
  /copilot/search/query:
    post:
      operationId: querySearchContent
      summary: Search OneDrive content using natural language
      description: >
        Perform hybrid search (semantic and lexical) across OneDrive for work or
        school content using natural language queries. Results are returned with
        contextual understanding and intelligent ranking while maintaining
        security and compliance.
      tags:
        - Content Search
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchQueryRequest'
      responses:
        '200':
          description: Search results returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchQueryResponse'
              examples:
                Default:
                  value:
                    value:
                      - hitId: "hit-001"
                        rank: 1
                        summary: "Q3 2025 budget presentation covering departmental allocations and projected spending through year end."
                        resource:
                          '@odata.type': "#microsoft.graph.driveItem"
                          id: "01XYZABC12345678"
                          name: "Q3-2025-Budget-Presentation.pptx"
                          webUrl: "https://contoso-my.sharepoint.com/personal/jdoe/Documents/Q3-2025-Budget-Presentation.pptx"
                          lastModifiedDateTime: "2025-08-15T14:30:00Z"
                          createdBy:
                            user:
                              displayName: "Jane Doe"
                              id: "user-abc-123"
                      - hitId: "hit-002"
                        rank: 2
                        summary: "Annual budget planning template with quarterly breakdown and variance tracking worksheets."
                        resource:
                          '@odata.type': "#microsoft.graph.driveItem"
                          id: "01XYZABC87654321"
                          name: "Annual-Budget-Template.xlsx"
                          webUrl: "https://contoso-my.sharepoint.com/personal/jsmith/Documents/Annual-Budget-Template.xlsx"
                          lastModifiedDateTime: "2025-07-01T09:00:00Z"
                          createdBy:
                            user:
                              displayName: "John Smith"
                              id: "user-def-456"
                    '@odata.count': 2
                    moreResultsAvailable: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ──────────────────────────────────────────────
  # Interaction Exports API
  # ──────────────────────────────────────────────
  /copilot/interactions:
    get:
      operationId: listCopilotInteractions
      summary: List Copilot interactions
      description: >
        Retrieve a list of user interactions with Copilot across Microsoft 365
        applications. Supports filtering by date range, user, and application.
        Enables compliance solutions to capture and archive AI interactions.
      tags:
        - Interaction Exports
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      parameters:
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/FilterParam'
        - $ref: '#/components/parameters/OrderByParam'
        - name: startDateTime
          in: query
          description: Start of the date/time range for interactions (ISO 8601).
          schema:
            type: string
            format: date-time
        - name: endDateTime
          in: query
          description: End of the date/time range for interactions (ISO 8601).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: A collection of Copilot interactions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InteractionCollectionResponse'
              examples:
                Default:
                  value:
                    value:
                      - id: "interaction-001"
                        createdDateTime: "2025-09-10T10:15:00Z"
                        userId: "user-abc-123"
                        userDisplayName: "Jane Doe"
                        appId: "Word"
                        interactionType: "prompt"
                        content: "Summarize the key points from the Q3 sales report."
                        contextReferences:
                          - type: "driveItem"
                            id: "01ABCDEF11111111"
                            name: "Q3-Sales-Report.docx"
                            webUrl: "https://contoso.sharepoint.com/sites/sales/Q3-Sales-Report.docx"
                      - id: "interaction-002"
                        createdDateTime: "2025-09-10T10:15:05Z"
                        userId: "user-abc-123"
                        userDisplayName: "Jane Doe"
                        appId: "Word"
                        interactionType: "response"
                        content: "The Q3 sales report highlights a 12% increase in revenue year-over-year driven by strong performance in the enterprise segment."
                        contextReferences: []
                    '@odata.count': 2
                    '@odata.nextLink': "https://graph.microsoft.com/v1.0/copilot/interactions?$skip=2&$top=25"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /copilot/interactions/{interactionId}:
    get:
      operationId: getCopilotInteraction
      summary: Get a specific Copilot interaction
      description: Retrieve details of a specific Copilot interaction by its ID.
      tags:
        - Interaction Exports
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      parameters:
        - name: interactionId
          in: path
          required: true
          description: Unique identifier for the interaction.
          schema:
            type: string
      responses:
        '200':
          description: The requested interaction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotInteraction'
              examples:
                Default:
                  value:
                    id: "interaction-001"
                    createdDateTime: "2025-09-10T10:15:00Z"
                    userId: "user-abc-123"
                    userDisplayName: "Jane Doe"
                    appId: "Word"
                    interactionType: "prompt"
                    content: "Summarize the key points from the Q3 sales report."
                    contextReferences:
                      - type: "driveItem"
                        id: "01ABCDEF11111111"
                        name: "Q3-Sales-Report.docx"
                        webUrl: "https://contoso.sharepoint.com/sites/sales/Q3-Sales-Report.docx"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ──────────────────────────────────────────────
  # Change Notifications API (preview)
  # ──────────────────────────────────────────────
  /copilot/subscriptions:
    post:
      operationId: createCopilotSubscription
      summary: Create a change notification subscription
      description: >
        Subscribe to change notifications for Copilot interactions across
        Microsoft 365. Enables real-time monitoring, proactive compliance
        checks, anomaly detection, and auditing.
      tags:
        - Change Notifications
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '201':
          description: Subscription created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              examples:
                Default:
                  value:
                    id: "sub-001-abc"
                    resource: "/copilot/interactions"
                    changeType: "created"
                    notificationUrl: "https://contoso.com/webhooks/copilot-notifications"
                    expirationDateTime: "2025-10-15T00:00:00Z"
                    clientState: "contoso-secret-state-value"
                    createdDateTime: "2025-09-10T12:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listCopilotSubscriptions
      summary: List active change notification subscriptions
      description: Retrieve all active Copilot change notification subscriptions.
      tags:
        - Change Notifications
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      responses:
        '200':
          description: A list of active subscriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCollectionResponse'
              examples:
                Default:
                  value:
                    value:
                      - id: "sub-001-abc"
                        resource: "/copilot/interactions"
                        changeType: "created"
                        notificationUrl: "https://contoso.com/webhooks/copilot-notifications"
                        expirationDateTime: "2025-10-15T00:00:00Z"
                        clientState: "contoso-secret-state-value"
                        createdDateTime: "2025-09-10T12:00:00Z"
                      - id: "sub-002-def"
                        resource: "/copilot/interactions"
                        changeType: "updated"
                        notificationUrl: "https://contoso.com/webhooks/copilot-updates"
                        expirationDateTime: "2025-10-20T00:00:00Z"
                        clientState: "contoso-update-state"
                        createdDateTime: "2025-09-11T08:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /copilot/subscriptions/{subscriptionId}:
    get:
      operationId: getCopilotSubscription
      summary: Get a specific subscription
      tags:
        - Change Notifications
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The requested subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              examples:
                Default:
                  value:
                    id: "sub-001-abc"
                    resource: "/copilot/interactions"
                    changeType: "created"
                    notificationUrl: "https://contoso.com/webhooks/copilot-notifications"
                    expirationDateTime: "2025-10-15T00:00:00Z"
                    clientState: "contoso-secret-state-value"
                    createdDateTime: "2025-09-10T12:00:00Z"
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateCopilotSubscription
      summary: Renew or update a subscription
      tags:
        - Change Notifications
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionUpdateRequest'
      responses:
        '200':
          description: Subscription updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              examples:
                Default:
                  value:
                    id: "sub-001-abc"
                    resource: "/copilot/interactions"
                    changeType: "created"
                    notificationUrl: "https://contoso.com/webhooks/copilot-notifications"
                    expirationDateTime: "2025-11-15T00:00:00Z"
                    clientState: "contoso-secret-state-value"
                    createdDateTime: "2025-09-10T12:00:00Z"
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteCopilotSubscription
      summary: Delete a subscription
      tags:
        - Change Notifications
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Subscription deleted successfully.
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────────
  # Meeting Insights API
  # ──────────────────────────────────────────────
  /copilot/meetings/{meetingId}/insights:
    get:
      operationId: getMeetingInsightsById
      summary: Get AI-generated meeting insights
      description: >
        Extract AI-generated meeting notes, action items, decisions, and
        discussion topics for a specific Teams meeting. Useful for integrating
        with project management tools, CRM systems, or custom workflows.
      tags:
        - Meeting Insights
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      parameters:
        - name: meetingId
          in: path
          required: true
          description: >
            The unique identifier of the Teams meeting (online meeting ID or
            join URL encoded).
          schema:
            type: string
      responses:
        '200':
          description: Meeting insights retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingInsights'
              examples:
                Default:
                  value:
                    meetingId: "meeting-xyz-789"
                    subject: "Q3 Product Roadmap Review"
                    startDateTime: "2025-09-10T14:00:00Z"
                    endDateTime: "2025-09-10T15:00:00Z"
                    summary: "The team reviewed the Q3 product roadmap, confirmed the launch date for the new dashboard feature, and discussed resource allocation for the mobile app initiative."
                    topics:
                      - id: "topic-001"
                        title: "Dashboard Feature Launch"
                        description: "Discussion of the new analytics dashboard feature timeline and QA readiness."
                        timestamp: "00:05:30"
                      - id: "topic-002"
                        title: "Mobile App Resource Allocation"
                        description: "Review of staffing needs for the mobile app initiative in Q4."
                        timestamp: "00:25:00"
                    actionItems:
                      - id: "action-001"
                        description: "Finalize QA test plan for the dashboard feature by end of week."
                        assignedTo:
                          userId: "user-abc-123"
                          displayName: "Jane Doe"
                        dueDate: "2025-09-14"
                        status: "pending"
                      - id: "action-002"
                        description: "Draft resource request for two additional mobile developers."
                        assignedTo:
                          userId: "user-def-456"
                          displayName: "John Smith"
                        dueDate: "2025-09-17"
                        status: "pending"
                    decisions:
                      - id: "decision-001"
                        description: "Dashboard feature launch confirmed for October 1, 2025."
                        madeBy:
                          userId: "user-ghi-789"
                          displayName: "Maria Garcia"
                    participants:
                      - userId: "user-ghi-789"
                        displayName: "Maria Garcia"
                        role: "organizer"
                      - userId: "user-abc-123"
                        displayName: "Jane Doe"
                        role: "presenter"
                      - userId: "user-def-456"
                        displayName: "John Smith"
                        role: "attendee"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /copilot/meetings:
    get:
      operationId: listMeetingsWithInsights
      summary: List meetings with available insights
      description: >
        List Teams meetings for which AI-generated insights are available.
        Supports filtering by date range and participants.
      tags:
        - Meeting Insights
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      parameters:
        - $ref: '#/components/parameters/TopParam'
        - $ref: '#/components/parameters/SkipParam'
        - $ref: '#/components/parameters/FilterParam'
        - name: startDateTime
          in: query
          schema:
            type: string
            format: date-time
        - name: endDateTime
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: A list of meetings with available insights.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingCollectionResponse'
              examples:
                Default:
                  value:
                    value:
                      - meetingId: "meeting-xyz-789"
                        subject: "Q3 Product Roadmap Review"
                        startDateTime: "2025-09-10T14:00:00Z"
                        endDateTime: "2025-09-10T15:00:00Z"
                        insightsAvailable: true
                      - meetingId: "meeting-uvw-456"
                        subject: "Weekly Engineering Standup"
                        startDateTime: "2025-09-09T09:00:00Z"
                        endDateTime: "2025-09-09T09:30:00Z"
                        insightsAvailable: true
                    '@odata.count': 2
                    '@odata.nextLink': "https://graph.microsoft.com/v1.0/copilot/meetings?$skip=2&$top=25"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ──────────────────────────────────────────────
  # Chat Completions API (preview)
  # ──────────────────────────────────────────────
  /copilot/chat/completions:
    post:
      operationId: createChatCompletion
      summary: Send a message to Microsoft 365 Copilot
      description: >
        Enable conversational experiences powered by Microsoft 365 Copilot.
        Send user messages and receive AI-generated responses grounded in
        Microsoft 365 data and user context. Supports multi-turn conversations.
      tags:
        - Chat Completions
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat completion response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                Default:
                  value:
                    id: "chatcmpl-001-xyz"
                    threadId: "thread-abc-123"
                    created: "2025-09-10T16:00:00Z"
                    choices:
                      - index: 0
                        message:
                          role: "assistant"
                          content: "Based on your organization's travel policy, international travel requires VP-level approval at least two weeks in advance. The policy also requires booking through the approved travel portal. You can find the full policy in the Employee Handbook on SharePoint."
                        finishReason: "stop"
                    citations:
                      - id: "cite-001"
                        name: "Employee-Handbook-2025.pdf"
                        webUrl: "https://contoso.sharepoint.com/sites/hr/Employee-Handbook-2025.pdf"
                        snippet: "International travel requires VP-level approval submitted at least 14 calendar days prior to departure."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /copilot/chat/threads:
    post:
      operationId: createChatThread
      summary: Create a new chat thread
      description: >
        Create a new conversational thread with Microsoft 365 Copilot for
        multi-turn interactions.
      tags:
        - Chat Completions
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatThreadRequest'
      responses:
        '201':
          description: Chat thread created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatThread'
              examples:
                Default:
                  value:
                    id: "thread-abc-123"
                    displayName: "Travel Policy Questions"
                    createdDateTime: "2025-09-10T16:00:00Z"
                    lastUpdatedDateTime: "2025-09-10T16:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /copilot/chat/threads/{threadId}:
    get:
      operationId: getChatThreadById
      summary: Get a chat thread
      tags:
        - Chat Completions
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "Default"
      parameters:
