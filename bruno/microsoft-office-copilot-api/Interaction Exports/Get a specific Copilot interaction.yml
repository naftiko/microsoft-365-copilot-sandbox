info:
  name: Get a specific Copilot interaction
  type: http
  seq: 2
  tags:
    - Interaction Exports

http:
  method: GET
  url: "{{baseUrl}}/copilot/interactions/:interactionId"
  params:
    - name: interactionId
      value: "123"
      type: path
      description: Unique identifier for the interaction.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

