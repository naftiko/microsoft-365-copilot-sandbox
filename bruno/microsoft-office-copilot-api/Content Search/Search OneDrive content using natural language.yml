info:
  name: Search OneDrive content using natural language
  type: http
  seq: 1
  tags:
    - Content Search

http:
  method: POST
  url: "{{baseUrl}}/copilot/search/query"
  body:
    type: json
    data: |-
      {
        "queryString": "",
        "entityTypes": [
          "driveItem"
        ],
        "from": 0,
        "size": 0,
        "sortProperties": [
          {
            "name": "",
            "isDescending": false
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

