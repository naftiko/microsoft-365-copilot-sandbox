info:
  name: List meetings with available insights
  type: http
  seq: 2
  tags:
    - Meeting Insights

http:
  method: GET
  url: "{{baseUrl}}/copilot/meetings?$top=25&$skip=0&$filter=name&startDateTime=2026-01-01&endDateTime=2026-01-01"
  params:
    - name: $top
      value: "25"
      type: query
      description: Maximum number of results to return.
    - name: $skip
      value: "0"
      type: query
      description: Number of results to skip for pagination.
    - name: $filter
      value: name
      type: query
      description: OData filter expression.
    - name: startDateTime
      value: 2026-01-01
      type: query
    - name: endDateTime
      value: 2026-01-01
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

