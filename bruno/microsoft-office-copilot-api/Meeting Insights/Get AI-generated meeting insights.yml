info:
  name: Get AI-generated meeting insights
  type: http
  seq: 1
  tags:
    - Meeting Insights

http:
  method: GET
  url: "{{baseUrl}}/copilot/meetings/:meetingId/insights"
  params:
    - name: meetingId
      value: meeting-xyz-789
      type: path
      description: |
        The unique identifier of the Teams meeting (online meeting ID or join URL encoded).
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

