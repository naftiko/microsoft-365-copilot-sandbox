info:
  name: Send a message to Microsoft 365 Copilot
  type: http
  seq: 1
  tags:
    - Chat Completions

http:
  method: POST
  url: "{{baseUrl}}/copilot/chat/completions"
  body:
    type: json
    data: |-
      {
        "messages": [
          {
            "role": "system",
            "content": ""
          }
        ],
        "threadId": "",
        "options": {
          "groundInM365Content": false,
          "maxTokens": 0,
          "temperature": 0
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

