info:
  name: Create a new chat thread
  type: http
  seq: 2
  tags:
    - Chat Completions

http:
  method: POST
  url: "{{baseUrl}}/copilot/chat/threads"
  body:
    type: json
    data: |-
      {
        "displayName": "",
        "initialMessage": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Default
    request:
      url: "{{baseUrl}}/copilot/chat/threads"
      method: POST
      body:
        type: json
        data: |-
          {
            "displayName": "",
            "initialMessage": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "thread-abc-123",
            "displayName": "Travel Policy Questions",
            "createdDateTime": "2025-09-10T16:00:00Z",
            "lastUpdatedDateTime": "2025-09-10T16:00:00Z"
          }
