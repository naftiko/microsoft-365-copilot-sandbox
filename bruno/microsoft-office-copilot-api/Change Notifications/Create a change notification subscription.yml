info:
  name: Create a change notification subscription
  type: http
  seq: 1
  tags:
    - Change Notifications

http:
  method: POST
  url: "{{baseUrl}}/copilot/subscriptions"
  body:
    type: json
    data: |-
      {
        "changeType": "created",
        "notificationUrl": "",
        "resource": "",
        "expirationDateTime": "",
        "clientState": ""
      }
  auth: inherit

settings:
