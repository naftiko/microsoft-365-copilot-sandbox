info:
  name: List active change notification subscriptions
  type: http
  seq: 2
  tags:
    - Change Notifications

http:
  method: GET
  url: "{{baseUrl}}/copilot/subscriptions"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Default
    request:
      url: "{{baseUrl}}/copilot/subscriptions"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "value": [
              {
                "id": "sub-001-abc",
                "resource": "/copilot/interactions",
                "changeType": "created",
                "notificationUrl": "https://contoso.com/webhooks/copilot-notifications",
                "expirationDateTime": "2025-10-15T00:00:00Z",
                "clientState": "contoso-secret-state-value",
                "createdDateTime": "2025-09-10T12:00:00Z"
              },
              {
                "id": "sub-002-def",
                "resource": "/copilot/interactions",
                "changeType": "updated",
                "notificationUrl": "https://contoso.com/webhooks/copilot-updates",
                "expirationDateTime": "2025-10-20T00:00:00Z",
                "clientState": "contoso-update-state",
                "createdDateTime": "2025-09-11T08:30:00Z"
              }
            ]
          }
  - name: Default
    request:
      url: "{{baseUrl}}/copilot/subscriptions"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": "Unauthorized",
              "message": "Authentication token is missing, expired, or invalid.",
              "innerError": {
                "requestId": "req-err-401-001",
                "date": "2025-09-10T12:00:00Z"
              }
            }
          }
  - name: Default
    request:
      url: "{{baseUrl}}/copilot/subscriptions"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": "Forbidden",
              "message": "Insufficient privileges to complete the operation. Verify the required permissions are granted.",
              "innerError": {
                "requestId": "req-err-403-001",
                "date": "2025-09-10T12:00:00Z"
              }
            }
          }
  - name: Default
    request:
      url: "{{baseUrl}}/copilot/subscriptions"
      method: GET
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": "TooManyRequests",
              "message": "Rate limit exceeded. Please retry after the number of seconds specified in the Retry-After header.",
              "innerError": {
                "requestId": "req-err-429-001",
                "date": "2025-09-10T12:00:00Z"
              }
            }
          }
  - name: Default
    request:
      url: "{{baseUrl}}/copilot/subscriptions"
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": "InternalServerError",
              "message": "An unexpected error occurred while processing the request. Please try again later.",
              "innerError": {
                "requestId": "req-err-500-001",
                "date": "2025-09-10T12:00:00Z"
              }
            }
          }
