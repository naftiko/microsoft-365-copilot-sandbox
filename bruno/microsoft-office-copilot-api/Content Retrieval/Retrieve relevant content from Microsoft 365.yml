info:
  name: Retrieve relevant content from Microsoft 365
  type: http
  seq: 1
  tags:
    - Content Retrieval

http:
  method: POST
  url: "{{baseUrl}}/copilot/retrieval/query"
  body:
    type: json
    data: |-
      {
        "query": "",
        "contentSources": [
          {
            "type": "sharePointSite",
            "id": ""
          }
        ],
        "maxResults": 0,
        "options": {
          "respectSensitivityLabels": false,
          "includeSnippets": false
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

