info:
  name: Get Copilot usage report
  type: http
  seq: 1
  tags:
    - Usage Reports

http:
  method: GET
  url: "{{baseUrl}}/reports/copilot/usage?period=D7&period=D30&period=D90&period=D180&$top=25&$skip=0"
  params:
    - name: period
      value: D7
      type: query
      description: |
        The reporting period. Supported values: D7, D30, D90, D180.
    - name: period
      value: D30
      type: query
      description: |
        The reporting period. Supported values: D7, D30, D90, D180.
    - name: period
      value: D90
      type: query
      description: |
        The reporting period. Supported values: D7, D30, D90, D180.
    - name: period
      value: D180
      type: query
      description: |
        The reporting period. Supported values: D7, D30, D90, D180.
    - name: date
      value: ""
      type: query
      description: |
        Specific date to report on (ISO 8601 date). If omitted, returns the latest available data.
      disabled: true
    - name: $top
      value: "25"
      type: query
      description: Maximum number of results to return.
    - name: $skip
      value: "0"
      type: query
      description: Number of results to skip for pagination.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

